<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Runtime Viewer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #ui-overlay {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px;
      }
      #ui-overlay button, #ui-overlay input[type="text"] {
        background: rgba(30,30,50,0.85); color: #e0e0e0;
        border: 1px solid #444; border-radius: 4px; padding: 6px 10px;
        font-size: 13px; cursor: pointer;
      }
      #ui-overlay button:hover { background: rgba(60,60,90,0.95); }
      #status {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        background: rgba(30,30,50,0.75); color: #9ca3af;
        border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-overlay">
      <input type="file" id="map-file-input" accept=".json" style="display:none" />
      <button id="load-map-btn">Load Map JSON</button>
      <input type="text" id="ws-url-input" placeholder="ws://localhost:8090" value="ws://localhost:8090" style="width:220px" />
      <button id="connect-ws-btn">Connect WebSocket</button>
    </div>
    <div id="status">No map loaded</div>
    <script type="module" src="/src/viewer/main.ts"></script>
  </body>
</html>
